<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Classroom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="poki-header">
        <div class="header-content">
            <div class="logo">🎮  Unblocked Games</div>
            <div class="header-right">
                <span id="game-count" class="game-count"></span>
                <div class="search-container">
                    <input type="text" id="search-bar" placeholder="Search games...">
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="game-grid" class="poki-grid"></div>
    </main>

    <div id="game-modal" class="hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Game Title</h2>
                <button id="close-btn">✖ Close</button>
            </div>
            <div id="iframe-container"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
